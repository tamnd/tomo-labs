title       = "tomo-labs"
baseURL     = "https://tomo-labs.tamnd.com/"
description = "tomo-labs runs coding agents through the same tasks on the same model and measures what actually happened. A trace proxy holds the model fixed across tomo, codex, opencode, claude-code, openclaw, hermes, and gemini-cli, and every result is graded from the files an agent left on disk."
contentDir  = "content"
outputDir   = "public"
theme       = "tago-doks"
syntaxHighlight = "true"
# The experiments archive is captured live through the day, so a report or a day
# index can carry a timestamp a few hours ahead of the build clock. Build future
# dated pages so nothing drops out of the timeline while the day is still running.
buildFuture = true

[params]
github = "https://github.com/tamnd/tomo-labs"
