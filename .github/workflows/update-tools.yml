name: update-tools

# Every day, resolve the newest upstream release of each wired tool, betas
# included, and open a pull request that bumps the version pins. The images are
# not rebuilt or rerun here, since that needs a container runtime and the model
# key; the pull request is a reviewable record of what moved, and the results
# are refreshed on a machine that can run the sweep.

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Resolve newest versions
        id: bump
        run: |
          go run scripts/update_tools.go -summary "$RUNNER_TEMP/bumps.md"
          if git diff --quiet -- tools/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          day=$(date -u +%Y%m%d)
          branch="tools/bump-$day"
          git config user.name 'Tam Nguyen Duc'
          git config user.email '1218621+tamnd@users.noreply.github.com'
          git config commit.gpgsign false
          git checkout -b "$branch"
          git add tools/
          git commit -m "Bump wired tools to their newest releases"
          git push -f -u origin "$branch"
          {
            echo "Daily bump of the wired tools to their newest upstream releases, betas included."
            echo
            cat "$RUNNER_TEMP/bumps.md"
            echo
            echo "Rebuild the images and rerun the sweep to refresh the results after merging."
          } > "$RUNNER_TEMP/body.md"
          gh pr create --title "Bump wired tools ($day)" --body-file "$RUNNER_TEMP/body.md" \
            --head "$branch" --base main || true
